<body>
    <div class="container">
        <div class="title-section">
            <h1 class="title">HAGAKURE PROGRAMMING塾
Scroll　ブログカウンター</h1>
        </div>
        
        <div class="content-area">
            <div class="level-image-container">
                <img src="" alt="レベル" id="level-image" style="display: none;">
                <div class="loading" id="level-loading">読み込み中...</div>
            </div>

            <div class="description">
                目標に近ずくにつれ、拙者の装備が充実するでござる
皆でブログを書いて、拙者を立派な侍にするでござる！
            </div>

            <div class="stats-section">
                <div class="stat-card" id="blog-card">
                    <div class="stat-header">
                        <div class="stat-label">📝 2026年ブログ数</div>
                        <div class="stat-icon">📊</div>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value-wrapper">
                            <span class="stat-number" id="blog-number">0</span>
                            <span class="stat-unit">件</span>
                        </div>
                        <div class="stat-goal">目標: <span id="blog-goal">80</span>件</div>
                        <div class="stat-progress">
                            <div class="stat-progress-bar" id="blog-progress" style="width: 0%"></div>
                            <span class="stat-percentage" id="blog-percentage">0%</span>
                        </div>
                    </div>
                </div>
                <div class="stat-card" id="writer-card">
                    <div class="stat-header">
                        <div class="stat-label">✍️ 2026年ライター数</div>
                        <div class="stat-icon">👥</div>
                    </div>
                    <div class="stat-content">
                        <div class="stat-value-wrapper">
                            <span class="stat-number" id="writer-number">0</span>
                            <span class="stat-unit">人</span>
                        </div>
                        <div class="stat-goal">目標: <span id="writer-goal">20</span>人</div>
                        <div class="stat-progress">
                            <div class="stat-progress-bar" id="writer-progress" style="width: 0%"></div>
                            <span class="stat-percentage" id="writer-percentage">0%</span>
                        </div>
                    </div>
                </div>
            </div>

            <a href="https://hagakurepgm.net/blog/" class="blog-write-button" target="_blank" rel="noopener noreferrer">
                <img src="images/scroll_logo.png" alt="Scroll">
                <span>ブログを書く</span>
            </a>
        </div>
    </div>

    <script>
        // Googleスプレッドシートの設定
        const SPREADSHEET_ID = '1YXsSUy3moQ_HwfGIYm0Tf_pG-IZEf3htmd5WSiIcteU';
        const SHEET_NAME = 'counter';
        const API_KEY = ''; // Google Sheets APIキーが必要な場合は設定

        // レベル画像のマッピング（ブログ数に応じて）
        const levelImages = {
            0: 'images/LEVEL1.png',
            10: 'images/LEVEL10.png',
            20: 'images/LEVEL20.png',
            30: 'images/LEVEL30.png',
            40: 'images/LEVEL40.png',
            50: 'images/LEVEL50.png',
            60: 'images/LEVEL60.png',
            70: 'images/LEVEL70.png'
        };

        // レベル画像を取得する関数
        function getLevelImage(blogCount) {
            const levels = Object.keys(levelImages).map(Number).sort((a, b) => b - a);
            for (const level of levels) {
                // レベル70の画像は80件（目標値）に到達しないと表示しない
                if (level === 70) {
                    if (blogCount >= 80) {
                        return levelImages[level];
                    }
                    continue; // 80件未満の場合は次のレベルをチェック
                }
                if (blogCount >= level) {
                    return levelImages[level];
                }
            }
            return levelImages[0]; // デフォルト
        }

        // CSV行をパースする関数（引用符や改行に対応）
        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i + 1] === '"') {
                        // エスケープされた引用符
                        current += '"';
                        i++;
                    } else {
                        // 引用符の開始/終了
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    // フィールドの区切り
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            
            // 最後のフィールドを追加
            result.push(current.trim());
            return result;
        }

        // Googleスプレッドシートからデータを取得
        async function fetchDataFromSheet() {
            try {
                // CSVエクスポートURLを使用（公開されている場合）
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;
                
                const response = await fetch(csvUrl);
                if (!response.ok) {
                    throw new Error(`データの取得に失敗しました: ${response.status}`);
                }

                const csvText = await response.text();
                console.log('取得したCSV:', csvText);
                
                const lines = csvText.split('\n').filter(line => line.trim() !== '');
                console.log('パースした行数:', lines.length);
                
                // ヘッダー行をスキップして、A2, B2の値を取得
                if (lines.length >= 2) {
                    const dataLine = parseCSVLine(lines[1]);
                    console.log('パースしたデータ:', dataLine);
                    
                    // 数値に変換（空文字やNaNの場合は0）
                    let blogCount = parseFloat(dataLine[0]?.replace(/[^\d.]/g, '') || '0');
                    let writerCount = parseFloat(dataLine[1]?.replace(/[^\d.]/g, '') || '0');
                    
                    // NaNチェック
                    if (isNaN(blogCount)) {
                        console.warn('ブログ数がNaNです。値:', dataLine[0]);
                        blogCount = 0;
                    }
                    if (isNaN(writerCount)) {
                        console.warn('ライター数がNaNです。値:', dataLine[1]);
                        writerCount = 0;
                    }
                    
                    // 整数に変換
                    blogCount = Math.floor(blogCount);
                    writerCount = Math.floor(writerCount);
                    
                    console.log('最終的な値 - ブログ数:', blogCount, 'ライター数:', writerCount);

                    // UIを更新
                    updateUI(blogCount, writerCount);
                } else {
                    throw new Error('データが見つかりません');
                }
            } catch (error) {
                console.error('エラー:', error);
                // エラー時はデフォルト値を表示
                updateUI(0, 0);
                document.getElementById('blog-number').textContent = 'エラー';
                document.getElementById('writer-number').textContent = 'エラー';
            }
        }

        // 数字をカウントアップアニメーションで表示
        function animateNumber(element, targetValue, duration = 1000) {
            const startValue = parseInt(element.textContent) || 0;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // イージング関数（ease-out）
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentValue = Math.floor(startValue + (targetValue - startValue) * easeOut);
                
                element.textContent = currentValue;
                
                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    element.textContent = targetValue;
                }
            }
            
            requestAnimationFrame(update);
        }

        // UIを更新する関数
        function updateUI(blogCount, writerCount) {
            const blogGoal = 80;
            const writerGoal = 20;

            // ブログ数の更新
            const blogNumberElement = document.getElementById('blog-number');
            animateNumber(blogNumberElement, blogCount);
            
            const blogProgress = document.getElementById('blog-progress');
            const blogPercentage = document.getElementById('blog-percentage');
            const blogPercent = Math.min((blogCount / blogGoal) * 100, 100);
            blogProgress.style.width = blogPercent + '%';
            blogPercentage.textContent = Math.round(blogPercent) + '%';

            // ライター数の更新
            const writerNumberElement = document.getElementById('writer-number');
            animateNumber(writerNumberElement, writerCount);
            
            const writerProgress = document.getElementById('writer-progress');
            const writerPercentage = document.getElementById('writer-percentage');
            const writerPercent = Math.min((writerCount / writerGoal) * 100, 100);
            writerProgress.style.width = writerPercent + '%';
            writerPercentage.textContent = Math.round(writerPercent) + '%';

            // レベル画像を更新（上部の円に表示）
            const levelImage = document.getElementById('level-image');
            const levelLoading = document.getElementById('level-loading');
            const levelImagePath = getLevelImage(blogCount);
            
            levelImage.src = levelImagePath;
            levelImage.onload = () => {
                levelImage.style.display = 'block';
                if (levelLoading) {
                    levelLoading.style.display = 'none';
                }
            };
            levelImage.onerror = () => {
                if (levelLoading) {
                    levelLoading.textContent = '画像の読み込みに失敗しました';
                    levelLoading.style.display = 'block';
                }
            };
        }

        // ページ読み込み時にデータを取得
        window.addEventListener('DOMContentLoaded', () => {
            fetchDataFromSheet();
            
            // 30秒ごとにデータを更新
            setInterval(fetchDataFromSheet, 30000);
        });
    </script>
